name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, cursor-sdk, pi-sdk, codex-sdk]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (server + web)
        run: bun run build

      - name: Lint (server tsc + web oxlint)
        run: bun run lint

      - name: Server unit tests
        run: bun run test

      - name: Web unit tests
        run: bun run --filter @nuncio/web test

      - name: Script unit tests
        run: bun run test:scripts

      - name: Require changeset for user-facing PR changes
        if: >-
          github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.title, 'chore: release version')
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: bun run check-changeset
